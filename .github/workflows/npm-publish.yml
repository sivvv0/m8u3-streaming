name: Publish to npm

on:
  push:
    branches:
      - main
      - master
    paths:
      - 'package.json'  # Only run when package.json changes
  workflow_dispatch:  # Allow manual trigger

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://registry.npmjs.org'
      
      - name: Install dependencies
        run: npm ci  # Clean install from package-lock.json
      
      - name: Run tests
        run: npm test
      
      - name: Build (if needed)
        run: npm run build  # Skip if no build step
      
      - name: Publish to npm
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
